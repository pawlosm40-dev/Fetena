            correct: "ለ"
        },
        {
            id: 36,
            question: "በማቴዎስ ወንጌል 28:19 ላይ 'በአብ በወልድና በመንፈስ ቅዱስ ስም' ሲል 'ስም' የሚለው ቃል በአንድ ቁጥር (Singular) መግባቱ በነገረ መለኮት ምን ተብሎ ይተረጎማል?",
            options: ["የሥላሴን የአንድነት ባሕርይና አንድ መለኮትነት (One Divine Essence)", "አብ ብቻ ስም እንዳለው", "የሦስቱ አካላት መደባለቅ", "ቃሉ ስለተሳሳተ"],
            correct: "ሀ"
        },
        {
            id: 37,
            question: "ከሚከተሉት መግለጫዎች ውስጥ 'ፓርሺያሊዝም' (Partialism) የሚባለውን የሥላሴ የክህደት ምሳሌ የሚገልጸው የትኛው ነው?",
            options: ["እያንዳንዱ አካል የመለኮት ሲሶ (አንድ ሦስተኛ) ክፍል ነው፤ ሦስቱ ሲደመሩ አንድ አምላክ ይሆናሉ የሚለው አስተሳሰብ", "ሥላሴ ስም ብቻ ናቸው ማለት", "አብ መጀመሪያ ነበረ ማለት", "መንፈስ ቅዱስ ኃይል ነው ማለት"],
            correct: "ሀ"
        },
        {
            id: 38,
            question: "በነገረ ሥላሴ 'ኢንሄረንስ' (Inherence) ማለት ምን ማለት ነው?",
            options: ["የባሕርይ ጠባያት በአካላት ውስጥ ፍጹም ጸንተው መኖራቸው", "ከውጭ የሚመጣ ኃይል", "መለኮት ዓለምን መልቀቁ", "የአካል መጥፋት"],
            correct: "ሀ"
        },
        {
            id: 39,
            question: "የፍራንክፈርት ጉባኤ (794 ዓ.ም) ከእስልምና አስተሳሰብ ጋር በመመሳሰል 'ክርስቶስ በባሕርዩ የእግዚአብሔር ልጅ አይደለም面 የጸጋ ልጅ ነው' ያሉትን የትኞቹን መናፍቃን አወገዘ?",
            options: ["አዶፕሺኒስቶች (Spanish Adoptionists)", "አርዮሳውያን", "ሰባልዮሳውያን", "መቅዶንዮሳውያን"],
            correct: "ሀ"
        },
        {
            id: 40,
            question: "በነገረ ሥላሴ ምስጢር 'አንድነት በሦስትነት面 ሦስትነት በአንድነት' (Unity in Trinity and Trinity in Unity) የሚለው መርህ ሲጠቃለል የሚከተለውን ይከለክላል፦",
            options: ["ሁሉንም አማልክት ማምለክ", "በአንድነት ስም አካላትን መደባለቅን (Sabelianism) እና በሦስትነት ስም ባሕርይን መከፈልን (Arianism/Tritheism)", "መጽሐፍ ቅዱስን ማንበብ", "ፍልስፍናን ሙሉ በሙሉ መጠቀም"],
            correct: "ለ"
        }
    ];

    // ጥያቄዎቹን በገጹ ላይ መጫን
    const container = document.getElementById('questionsContainer');
    questionsData.forEach((q, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        
        let optionsHTML = '';
        q.options.forEach((opt, optIndex) => {
            const optLetter = String.fromCharCode(4608 + optIndex); // ሀ, ለ, ሐ, መ
            optionsHTML += `
                <label class="option-label">
                    <input type="radio" name="q${q.id}" value="${optLetter}" required>
                    <strong>${optLetter})</strong> &nbsp;${opt}
                </label>
            `;
        });

        card.innerHTML = `
            <div class="question-text">${q.id}. ${q.question}</div>
            <div class="options-group">${optionsHTML}</div>
        `;
        container.appendChild(card);
    });

    // ፎርሙ ሲላክ ውጤት አስልቶ በሪፖርት ካርድ መልክ መላክ
    document.getElementById('quizForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');
        
        submitBtn.disabled = true;
        submitBtn.innerText = "ሪፖርት ካርድ በመላክ ላይ...";
        statusMessage.style.display = "block";
        statusMessage.style.background = "#eeeeee";
        statusMessage.style.color = "#000000";
        statusMessage.innerText = "ውጤትዎ እየታረመና ሪፖርት ካርዱ እየተዘጋጀ ነው...";

        const fullName = document.getElementById('fullName').value;
        const telegramUser = document.getElementById('telegramUser').value;

        let correctCount = 0;
        let reportDetails = "";

        // ውጤት ማረም
        questionsData.forEach(q => {
            const selected = document.querySelector(`input[name="q${q.id}"]:checked`);
            const userAns = selected ? selected.value : 'X';
            const isCorrect = userAns === q.correct;
            
            if (isCorrect) correctCount++;
            
            reportDetails += `ጥያቄ ${q.id}: ${userAns} [${isCorrect ? '✓' : '✗ (ትክክል: ' + q.correct + ')'}]\n`;
        });

        const scorePercentage = ((correctCount / 40) * 100).toFixed(1);
        const status = scorePercentage >= 50 ? "✅ ያለፈ (PASSED)" : "❌ የወደቀ (FAILED)";

        // 📝 የሪፖርት ካርድ ፅሁፍ መዋቅር (ወደ ቴሌግራም የሚሄድ)
        const telegramMessage = 
`📋 **TINISHU FAITHMAP - የፈተና ሪፖርት ካርድ** 📋
--------------------------------------------
👤 **የተፈታኝ ስም:** ${fullName}
✈️ **ቴሌግራም:** ${telegramUser}
--------------------------------------------
📊 **የማርክ ማጠቃለያ (Summary):**
• ጠቅላላ ጥያቄ፡ 40
• ትክክል የተመለሱ፡ ${correctCount}
• ስህተት የተመለሱ፡ ${40 - correctCount}
• ያገኘው ውጤት፡ \`${scorePercentage}%\`
• የብቃት ደረጃ፡ **${status}**
--------------------------------------------
📝 **የእያንዳንዱ ጥያቄ ዝርዝር ማረሚያ፦**
\`\`\`
${reportDetails}
\`\`\`
--------------------------------------------
📅 ቀን: ${new Date().toLocaleDateString('am-ET')}`;

        try {
            const textUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const textResponse = await fetch(textUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: telegramMessage,
                    parse_mode: 'Markdown'
                })
            });

            if (textResponse.ok) {
                statusMessage.style.background = "#000000";
                statusMessage.style.color = "#ffffff";
                statusMessage.innerText = `💥 ስኬት! የ ${fullName} የፈተና ሪፖርት ካርድ በተሳካ ሁኔታ ወደ ማህደሩ ተልኳል። ውጤት፡ ${scorePercentage}%`;
                document.getElementById('quizForm').reset();
            } else {
                throw new Error("መረጃውን መላክ አልተቻለም።");
            }

        } catch (error) {
            console.error(error);
            statusMessage.style.background = "#ffffff";
            statusMessage.style.color = "#ff0000";
            statusMessage.style.borderColor = "#ff0000";
            statusMessage.innerText = "❌ የስርዓት ስህተት! እባክዎ ኢንተርኔትዎን አረጋግጠው ድጋሚ ይሞክሩ።";
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "ፈተናውን ጨርስና ሪፖርት ካርድ ላክ";
        }
    });
</script>

</body>
</html>
